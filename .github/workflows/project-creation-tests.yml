name: Project creation tests

on:
  workflow_dispatch:
  release:
    types:
      - released # A release was published, or a pre-release was changed to a release.
  pull_request:
    types: [opened, synchronize]
    branches:
      - 'dev'
    paths:
      - '.github/workflows/project-creation-tests.yml'
      - 'create-quasar/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'pull_request' ||

        startsWith(github.event.release.tag_name, 'quasar') ||
        startsWith(github.event.release.tag_name, '@quasar/extras') ||
        startsWith(github.event.release.tag_name, '@quasar/app-vite')
      }}

    permissions:
      contents: read # to fetch code (actions/checkout)

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: create-quasar

    name: Lint create-quasar
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i

  test:
    needs: lint

    permissions:
      contents: read # to fetch code (actions/checkout)

    runs-on: ubuntu-latest

    env:
      # See https://github.com/yarnpkg/yarn/issues/9015
      SKIP_YARN_COREPACK_CHECK: 1

    defaults:
      run:
        working-directory: create-quasar

    strategy:
      fail-fast: false
      matrix:
        install: [yarn, npm, pnpm]
        template: [app, ae]
        script: [js, ts]
        linter: [oxlint]
        include:
          - engine: vite-3
            template: app
          - engine: vite-2
            template: app
          - engine: webpack-4
            template: app
          - linter: eslint
            template: app
          - fbr: true
            template: app
            engine: vite-3
          - allPresets: true
            template: app
            engine: vite-3

    name: Test ${{ matrix.install }}-${{ matrix.template }}-${{ matrix.script }}${{ matrix.engine && format('-{0}', matrix.engine) || '' }}-${{ matrix.linter }}${{ matrix.fbr == true && '-fbr' || '' }}${{ matrix.allPresets == true && '-allPresets' || '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i

      # pnpm
      - name: Get pnpm store directory
        if: ${{ matrix.install == 'pnpm' }}
        id: pnpm-cache
        run: |
          echo "PNPM_CACHE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      - name: Setup pnpm cache
        if: ${{ matrix.install == 'pnpm' }}
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.PNPM_CACHE_PATH }}
          key: pnpm-cache-${{ matrix.template }}-${{ matrix.script }}-${{ matrix.engine || '' }}-${{ matrix.linter }}
          restore-keys: |
            pnpm-cache-${{ matrix.template }}-${{ matrix.script }}-${{ matrix.engine || '' }}-
            pnpm-cache-

      # yarn
      - name: Get yarn cache directory
        if: ${{ matrix.install == 'yarn' }}
        id: yarn-cache
        run: |
          echo "YARN_CACHE_PATH=$(yarn cache dir)" >> $GITHUB_OUTPUT
      - name: Setup yarn cache
        if: ${{ matrix.install == 'yarn' }}
        uses: actions/cache@v5
        with:
          path: ${{ steps.yarn-cache.outputs.YARN_CACHE_PATH }}
          key: yarn-cache-${{ matrix.template }}-${{ matrix.script }}-${{ matrix.engine || '' }}-${{ matrix.linter }}
          restore-keys: |
            yarn-cache-${{ matrix.template }}-${{ matrix.script }}-${{ matrix.engine || '' }}-
            yarn-cache-

      # npm
      - name: Get npm cache directory
        if: ${{ matrix.install == 'npm' }}
        id: npm-cache
        run: |
          echo "NPM_CACHE_PATH=$(npm config get cache)" >> $GITHUB_OUTPUT
      - name: Setup npm cache
        if: ${{ matrix.install == 'npm' }}
        uses: actions/cache@v5
        with:
          path: ${{ steps.npm-cache.outputs.NPM_CACHE_PATH }}
          key: npm-cache-${{ matrix.template }}-${{ matrix.script }}-${{ matrix.engine || '' }}-${{ matrix.linter }}
          restore-keys: |
            npm-cache-${{ matrix.template }}-${{ matrix.script }}-${{ matrix.engine || '' }}-
            npm-cache-

      - name: Create the test project
        run: node bin/create-quasar.js test-project --template ${{ matrix.template }}${{ matrix.engine && format(' --engine {0}', matrix.engine) || '' }} --install ${{ matrix.install }}${{ matrix.script == 'ts' && ' --preset typescript' || '' }} --preset ${{ matrix.linter }}${{ matrix.filenameBasedRouting == true && ' --preset filenameBasedRouting' || '' }}${{ matrix.allPresets == true && ' --preset sass --preset i18n --preset pinia' || matrix.template == 'ae' && ' --preset prompts --preset install --preset uninstall' || '' }} --defaults

      - name: Lint the project
        working-directory: create-quasar/test-project
        run: ${{ matrix.install }} run lint

      - name: Test the build
        working-directory: create-quasar/test-project
        run: ${{ matrix.install }} run build

      - name: Test the development server
        working-directory: create-quasar/test-project
        env:
          # For Vite, see https://github.com/jeffbski/wait-on/issues/78#issuecomment-867813529
          WAIT_ON_CONFIG: |
            {
              "headers": {
                "accept": "text/html"
              }
            }

        # wait-on is pinned for stability and safety reasons, it can be updated manually after testing a new version
        run: |
          ${{ matrix.install }} run dev &

          if [[ '${{ matrix.engine }}' == vite* || '${{ matrix.template }}' == 'ae' ]]; then
            echo $WAIT_ON_CONFIG > wait-on.json
            npx wait-on@7.2.0 --config wait-on.json --timeout 5000 http-get://127.0.0.1:9000
          else
            PORT=$([[ '${{ matrix.engine }}' == 'webpack-4' ]] && echo '9000' || echo '8080')
            # 15s is almost enough, but due to possible fluctuations in the CI environment, we set it higher than that
            npx wait-on@7.2.0 --timeout 20000 http-get://127.0.0.1:$PORT
          fi

          kill $!
